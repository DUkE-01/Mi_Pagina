<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Background gradient: dark navy matching portfolio -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
    <!-- Cyan accent gradient for letters -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06d6f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" ry="7" fill="url(#bg)"/>

  <!-- Subtle cyan border -->
  <rect width="32" height="32" rx="7" ry="7" fill="none" stroke="#06d6f5" stroke-width="1" stroke-opacity="0.35"/>

  <!-- Decorative top-left accent dot -->
  <circle cx="4.5" cy="4.5" r="1.2" fill="#06d6f5" opacity="0.6"/>

  <!-- Letters JG -->
  <!-- J -->
  <text
    x="5.5"
    y="22.5"
    font-family="'Space Grotesk', 'Segoe UI', sans-serif"
    font-weight="700"
    font-size="16"
    fill="url(#textGrad)"
    filter="url(#glow)"
    letter-spacing="-0.5"
  >JG</text>

  <!-- Decorative underline accent -->
  <line x1="5.5" y1="25.5" x2="26.5" y2="25.5" stroke="#06d6f5" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>

  <!-- Bottom-right accent dot -->
  <circle cx="27.5" cy="27.5" r="1.2" fill="#06d6f5" opacity="0.6"/>
</svg>
